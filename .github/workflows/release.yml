name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate icon
        run: npm run icon

      - name: Check
        run: npm run check

      - name: Build
        run: npm run dist

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.dmg
            dist/*.zip
